version: "3"

services:
  sneakers-api:
    image: 246950780167.dkr.ecr.eu-central-1.amazonaws.com/sneakers-api:latest
    ports:
      - "3000:3000"

  mongodb:
    image: mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password

    depends_on:
    - mongo

  mongo:
    image: mongo
    ports:
      - "27017:27017"
  mongo-express: 
    image: mongo-express
    ports:
    - "8080:8081"
    environment:
    - ME_CONFIG_MONGODB_SERVER=mongo
      